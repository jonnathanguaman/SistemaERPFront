<div class="app-container">
  <!-- Menú lateral - solo visible cuando está autenticado -->
  <app-menu *ngIf="isAuthenticated"></app-menu>
  
  <!-- Contenido principal -->
  <main
    class="main-content"
    [class.full-width]="!isAuthenticated"
    [class.sidebar-collapsed]="isAuthenticated && isSidebarCollapsed"
  >
    <router-outlet></router-outlet>
  </main>
</div>
